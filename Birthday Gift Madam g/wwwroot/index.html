<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffe6f0" />

    <!-- Mobile Web App Capability -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />

    <title>Happy Birthday Madam G</title>

    <link rel="icon" href="favicon.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&display=swap" rel="stylesheet" />
    <link href="app.css" rel="stylesheet" />
    <style>
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.82; }
        }
    </style>
</head>

<body>

    <!-- ⏳ App Placeholder -->
    <div id="app-placeholder" style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #ffe6f0;
        font-family: 'Dancing Script', 'Great Vibes', 'Georgia', cursive, serif;
        font-size: clamp(2.2rem, 8vw, 3.8rem);
        color: #ff1493;
        text-shadow: 2px 2px 5px rgba(255, 20, 147, 0.2);
        z-index: 9999;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
        letter-spacing: 1px;">
        <span style="animation: pulse 1.5s ease-in-out infinite; display: inline-block;">Bss Thora sa Intizar orr...</span>
    </div>

    <!-- 🔹 Blazor App Root -->
    <div id="app"></div>

    <!-- 📦 JScex & Love Tree Scripts (Global dependency) -->
    <script src="jscex/jquery.min.js"></script>
    <script src="jscex/jscex.min.js"></script>
    <script src="jscex/jscex-parser.js"></script>
    <script src="jscex/jscex-jit.js"></script>
    <script src="jscex/jscex-builderbase.min.js"></script>
    <script src="jscex/jscex-async.min.js"></script>
    <script src="jscex/jscex-async-powerpack.min.js"></script>
    <script src="jscex/love.js" charset="utf-8"></script>

    <!-- 📜 App Logic Scripts -->
    <script src="script.js"></script>
    <script src="tree-animation.js"></script>
    <script src="birthday.js"></script>
    <script src="blazorHelpers.js"></script>

    <!-- Fallback if BlazorHelpers.js fails -->
    <script>
        window.blazorHelpers = window.blazorHelpers || {
            isMobile: function () { return window.innerWidth <= 768; },
            registerResizeCallback: function () { /* no-op fallback */ }
        };
    </script>

    <!-- 🚀 Load Blazor after everything else -->
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
